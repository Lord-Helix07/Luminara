# Luminara — web UI + Flask API. Open http://localhost:8080
# Run: docker compose up --build
# Runs frontend + backend + ollama together:
#   docker compose up --build
# First time model pull:
#   docker compose exec ollama ollama pull llama3


#hosts backend and uses 5050 as ports
services:
  backend:
    build:
      context: ./backend
    ports:
      - "5050:5050"
    environment:
      HOST: "0.0.0.0"
      PORT: "5050"
      FLASK_DEBUG: "0"
      LUMINARA_DATA_DIR: "/app/data"
      JWT_SECRET: "${JWT_SECRET:-dev-change-jwt-secret-in-production}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"
    volumes:
      - luminara_auth:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
#hosting frontend and uses 8080 as ports
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "8080:80"
    depends_on:
      - backend
#hosting ollama and uses 11434 as ports
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

#volumes for ollama data
volumes:
  ollama_data:
  luminara_auth:
